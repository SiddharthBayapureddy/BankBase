{% extends "base.html" %}

{% block title %}Admin Login - BankBase{% endblock %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 2rem auto;">
    <div class="card-header text-center">
        <h2 class="card-title">Admin Access</h2>
        <p class="card-subtitle">Enter the administrative password.</p>
    </div>

    <form method="post">
        <div class="form-group">
            <label class="form-label" for="password">Admin Password</label>
            <input type="password" id="password" name="password" class="form-input" required autofocus>
        </div>
        
        <button type="submit" class="btn btn-primary btn-block">Login as Admin</button>
        
        <div class="mt-2 text-center">
            <a href="{{ url_for('index') }}" class="text-muted">Back to Public Login</a>
        </div>
    </form>
</div>
{% endblock %}
